name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.0
      - name: Install Bundler
        run: gem install bundler:2.5.21
      - name: Install jekyll-sass-converter
        run: gem install jekyll-sass-converter -v 2.1.0
      - name: Install dependencies
        run: bundle install
      - name: Build and Deploy
        run: |
          docker run \
            -v ${{ github.workspace }}:/srv/jekyll \
            -v ${{ github.workspace }}/vendor/bundle:/usr/local/bundle \
            -e JEKYLL_PAT=${{ secrets.JEKYLL_PAT }} \
            jekyll/jekyll:latest \
            bash -c "chown -R jekyll:jekyll /srv/jekyll && jekyll build --trace"
          docker run \
            -v ${{ github.workspace }}:/srv/jekyll \
            -v ${{ github.workspace }}/vendor/bundle:/usr/local/bundle \
            -e JEKYLL_PAT=${{ secrets.JEKYLL_PAT }} \
            jekyll/jekyll:latest \
            bash -c "cd _site && git config --global --add safe.directory /srv/jekyll/_site && git init && git remote add origin https://x-access-token:${{ secrets.JEKYLL_PAT }}@github.com/${{ github.repository }}.git && git checkout -b gh-pages && git add . && git commit -m 'Deploy' && git push origin gh-pages --force"